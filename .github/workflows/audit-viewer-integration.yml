name: Audit viewer integration

on:
  push:
    paths:
      - .github/trigger-audit-viewer-integration.txt

permissions:
  contents: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
          path: source
          fetch-depth: 1

      - uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: pages
          fetch-depth: 1

      - name: Produce integration audit
        shell: bash
        run: |
          {
            echo "== SOURCE FILES =="
            find source -path 'source/.git' -prune -o -type f -printf '%s\t%p\n' | sort -k2
            echo
            echo "== GH-PAGES FILES =="
            find pages -path 'pages/.git' -prune -o -type f -printf '%s\t%p\n' | sort -k2
            echo
            echo "== RELEVANT SOURCE MATCHES =="
            grep -RInE 'tutorial-2d|click.*start|Click.*Start|logo|zip-loader|difficulty|mode|user-gesture|hasReceivedUserGesture|resolution|pixelRatio|devicePixelRatio|renderer|antialias|Info.dat|_difficultyBeatmapSets|postMessage|iframe' source --include='*.js' --include='*.html' --include='*.njk' --include='*.json' --exclude-dir=node_modules --exclude-dir=.git | head -2000 || true
            echo
            echo "== RELEVANT GH-PAGES MATCHES =="
            grep -RInE 'tutorial-2d|click.*start|Click.*Start|logo|zip-loader|difficulty|mode|user-gesture|hasReceivedUserGesture|resolution|pixelRatio|devicePixelRatio|renderer|antialias|Info.dat|_difficultyBeatmapSets|postMessage|iframe' pages/index.html pages/build pages/vendor --include='*.js' --include='*.html' 2>/dev/null | head -2000 || true
            echo
            echo "== PACKAGE JSON =="
            cat source/package.json
            echo
            echo "== WEBPACK CONFIG =="
            find source -maxdepth 2 -iname '*webpack*' -type f -exec sh -c 'echo --- $1; cat "$1"' _ {} \;
          } > source/viewer-integration-audit.txt

      - name: Commit report
        shell: bash
        run: |
          cd source
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/trigger-audit-viewer-integration.txt
          git add viewer-integration-audit.txt
          git commit -m "Audit viewer integration points"
          git push
