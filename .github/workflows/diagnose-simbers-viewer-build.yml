name: Diagnose Simplified Sabers viewer build

on:
  push:
    paths:
      - .github/trigger-diagnose-simbers-viewer.txt

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: '16'

      - name: Run patch and build with captured logs
        shell: bash
        run: |
          set +e
          python .github/scripts/integrate_simbers_viewer.py > /tmp/patch.log 2>&1
          PATCH_STATUS=$?
          INSTALL_STATUS=99
          BUILD_STATUS=99
          if [ "$PATCH_STATUS" -eq 0 ]; then
            npm install --legacy-peer-deps --no-audit --no-fund > /tmp/install.log 2>&1
            INSTALL_STATUS=$?
          else
            : > /tmp/install.log
          fi
          if [ "$INSTALL_STATUS" -eq 0 ]; then
            NODE_OPTIONS=--openssl-legacy-provider npm run build > /tmp/build.log 2>&1
            BUILD_STATUS=$?
          else
            : > /tmp/build.log
          fi
          {
            echo "PATCH_STATUS=$PATCH_STATUS"
            echo "INSTALL_STATUS=$INSTALL_STATUS"
            echo "BUILD_STATUS=$BUILD_STATUS"
            echo
            echo "== PATCH LOG =="
            tail -200 /tmp/patch.log
            echo
            echo "== INSTALL LOG =="
            tail -300 /tmp/install.log
            echo
            echo "== BUILD LOG =="
            tail -300 /tmp/build.log
          } > viewer-build-diagnostic.txt

      - name: Commit diagnostic
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/trigger-diagnose-simbers-viewer.txt
          git add viewer-build-diagnostic.txt
          git commit -m "Record lightweight viewer build diagnostic"
          git push
